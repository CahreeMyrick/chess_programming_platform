<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Chessboard.js Demo (Local Folder)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Local chessboard.js CSS -->
  <link rel="stylesheet" href="./chessboardjs-1.0.0/css/chessboard-1.0.0.min.css">

  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; padding: 24px; }
    #board { width: 420px; max-width: 90vw; }
  </style>
</head>
<body>
  <h1>Chessboard.js (Local Assets)</h1>
  <div id="board"></div>

  <!-- ✅ jQuery (CDN, guaranteed path) -->
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"
          integrity="sha384-ZvpUoO/+PpLXR1lu4jmpXWu80pZlYUAfxl5NsBMWOEPSjUn/6Z/hRTt8+pR6L4N2"
          crossorigin="anonymous"></script>

  <!-- ✅ chessboard.js (local) -->
  <script src="./chessboardjs-1.0.0/js/chessboard-1.0.0.min.js"></script>

  <script>
    const board = Chessboard('board', {
      position: 'start',
      draggable: true,

      // ✅ your images live under chessboardjs-1.0.0/img/...
      pieceTheme: './chessboardjs-1.0.0/img/chesspieces/wikipedia/{piece}.png'
    });

    window.addEventListener('resize', () => board.resize());
  </script>
</body>
</html>
